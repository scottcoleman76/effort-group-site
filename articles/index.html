<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles | The Effort Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0C0C0C; --navy:#0A2540; --navy-2:#1B263B; --charcoal:#212121;
    --off-white:#F2F2F2; --teal:#0B7B9E;
    --serif:'Fraunces', serif; --sans:'Inter', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); color:var(--charcoal); background:var(--off-white); line-height:1.55;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:900px; margin:0 auto; padding:0 32px;}
  header{padding:24px 0; border-bottom:1px solid rgba(10,37,64,0.1);}
  header .wrap{display:flex; justify-content:space-between; align-items:center;}
  .brand{font-family:var(--serif); font-weight:600; font-size:20px; color:var(--navy);}
  .back{font-size:14px; color:var(--teal); font-weight:500;}
  main{padding:72px 0 120px;}
  h1{font-family:var(--serif); font-weight:500; font-size:clamp(32px,4.5vw,48px); color:var(--navy); margin-bottom:14px;}
  .sub{color:#4a4a48; font-size:16.5px; max-width:56ch; margin-bottom:56px;}
  .card{
    display:block; padding:28px 0; border-bottom:1px solid rgba(10,37,64,0.1);
  }
  .card .meta{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal); margin-bottom:10px;}
  .card h2{font-family:var(--serif); font-weight:500; font-size:24px; color:var(--navy); margin-bottom:8px;}
  .card p{color:#4a4a48; font-size:15px;}
  .empty, .error{color:#7a7a77; font-size:15px; padding:40px 0;}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <a class="brand" href="/">The Effort Group</a>
    <a class="back" href="/">&larr; Back to site</a>
  </div>
</header>
<main>
  <div class="wrap">
    <h1>Articles</h1>
    <p class="sub">Thinking on leadership, organizational strategy, and growth from our team.</p>
    <div id="article-list">
      <p class="empty">Loading articles&hellip;</p>
    </div>
  </div>
</main>

<script src="repo-config.js"></script>
<script>
async function loadArticles() {
  const listEl = document.getElementById('article-list');
  const { owner, repo, branch } = window.EFFORT_REPO;

  if (owner === "YOUR_GITHUB_USERNAME") {
    listEl.innerHTML = '<p class="error">Article list isn\'t connected yet. Fill in articles/repo-config.js with your GitHub username and repo name once the site is connected to GitHub.</p>';
    return;
  }

  try {
    const dirRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/content/articles?ref=${branch}`);
    if (!dirRes.ok) throw new Error('Could not list articles');
    const files = (await dirRes.json()).filter(f => f.name.endsWith('.json'));

    const articles = await Promise.all(files.map(async f => {
      const raw = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/content/articles/${f.name}`);
      const data = await raw.json();
      data.slug = f.name.replace(/\.json$/, '');
      return data;
    }));

    articles.sort((a, b) => new Date(b.date) - new Date(a.date));

    if (articles.length === 0) {
      listEl.innerHTML = '<p class="empty">No articles published yet.</p>';
      return;
    }

    listEl.innerHTML = articles.map(a => `
      <a class="card" href="article.html?slug=${encodeURIComponent(a.slug)}">
        <div class="meta">${a.author || ''} &middot; ${new Date(a.date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}</div>
        <h2>${a.title || 'Untitled'}</h2>
        <p>${a.excerpt || ''}</p>
      </a>
    `).join('');
  } catch (err) {
    listEl.innerHTML = '<p class="error">Couldn\'t load articles right now. Please try again shortly.</p>';
    console.error(err);
  }
}
loadArticles();
</script>
</body>
</html>
