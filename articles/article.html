<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article | The Effort Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<style>
  :root{
    --black:#0C0C0C; --navy:#0A2540; --navy-2:#1B263B; --charcoal:#212121;
    --off-white:#F2F2F2; --teal:#0B7B9E;
    --serif:'Fraunces', serif; --sans:'Inter', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); color:var(--charcoal); background:var(--off-white); line-height:1.6;}
  a{color:var(--teal);}
  .wrap{max-width:760px; margin:0 auto; padding:0 32px;}
  header{padding:24px 0; border-bottom:1px solid rgba(10,37,64,0.1);}
  header .wrap{display:flex; justify-content:space-between; align-items:center;}
  .brand{font-family:var(--serif); font-weight:600; font-size:20px; color:var(--navy); text-decoration:none;}
  .back{font-size:14px; color:var(--teal); font-weight:500; text-decoration:none;}
  main{padding:72px 0 120px;}
  .meta{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal); margin-bottom:16px;}
  h1{font-family:var(--serif); font-weight:500; font-size:clamp(30px,4.5vw,44px); color:var(--navy); margin-bottom:32px; line-height:1.15;}
  .cover{width:100%; border-radius:2px; margin-bottom:40px;}
  .body-content{font-size:17px; color:var(--charcoal);}
  .body-content p{margin-bottom:20px;}
  .body-content h2, .body-content h3{font-family:var(--serif); color:var(--navy); margin:32px 0 14px;}
  .body-content img{max-width:100%; border-radius:2px; margin:24px 0;}
  .body-content blockquote{border-left:3px solid var(--teal); padding-left:18px; color:#4a4a48; margin:24px 0;}
  .sources{margin-top:56px; padding-top:28px; border-top:1px solid rgba(10,37,64,0.1);}
  .sources h3{font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--navy); margin-bottom:12px;}
  .sources ul{padding-left:20px; font-size:14.5px; color:#4a4a48;}
  .sources li{margin-bottom:6px;}
  .error{color:#7a7a77; font-size:15px; padding:40px 0;}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <a class="brand" href="/">The Effort Group</a>
    <a class="back" href="index.html">&larr; All articles</a>
  </div>
</header>
<main>
  <div class="wrap" id="article-root">
    <p class="error">Loading article&hellip;</p>
  </div>
</main>

<script src="repo-config.js"></script>
<script>
async function loadArticle() {
  const root = document.getElementById('article-root');
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const { owner, repo, branch } = window.EFFORT_REPO;

  if (!slug) { root.innerHTML = '<p class="error">No article specified.</p>'; return; }
  if (owner === "YOUR_GITHUB_USERNAME") {
    root.innerHTML = '<p class="error">Articles aren\'t connected yet. Set up articles/repo-config.js first.</p>';
    return;
  }

  try {
    const res = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/content/articles/${slug}.json`);
    if (!res.ok) throw new Error('Not found');
    const a = await res.json();

    const dateStr = new Date(a.date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
    const bodyHtml = window.marked ? marked.parse(a.body || '') : (a.body || '');
    const sourcesHtml = (a.sources && a.sources.length)
      ? `<div class="sources"><h3>Sources</h3><ul>${a.sources.map(s => `<li>${s}</li>`).join('')}</ul></div>`
      : '';
    const coverHtml = a.image ? `<img class="cover" src="${a.image}" alt="${a.title || ''}">` : '';

    document.title = `${a.title || 'Article'} | The Effort Group`;
    root.innerHTML = `
      <div class="meta">${a.author || ''} &middot; ${dateStr}</div>
      <h1>${a.title || 'Untitled'}</h1>
      ${coverHtml}
      <div class="body-content">${bodyHtml}</div>
      ${sourcesHtml}
    `;
  } catch (err) {
    root.innerHTML = '<p class="error">Couldn\'t find that article.</p>';
    console.error(err);
  }
}
loadArticle();
</script>
</body>
</html>
