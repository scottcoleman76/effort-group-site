backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "articles-media"
public_folder: "/articles-media"

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{author}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Author"
        name: "author"
        widget: "select"
        options: ["Angie Coleman", "Scott Coleman", "Emma Coleman"]
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Strategy", "AI", "Engagement", "Teams", "Leadership", "Economic", "Coaching", "Culture"]
        hint: "Pick the single best-fit topic. This becomes the article's main indexable section."
      - label: "Tags (optional, additional keywords)"
        name: "tags"
        widget: "list"
        required: false
        hint: "Optional extra keywords for on-site search. The Category above is what matters most for search engines."
      - { label: "Excerpt (short summary shown on the articles list)", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Sources"
        name: "sources"
        widget: "list"
        required: false
        field: { label: "Source (name and/or link)", name: "source", widget: "string" }
