backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "articles-media"
public_folder: "/articles-media"

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{author}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Author"
        name: "author"
        widget: "select"
        options: ["Angie Coleman", "Scott Coleman", "Emma Coleman"]
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - label: "Categories (pick 2-3 core topics — each becomes its own indexable page)"
        name: "category"
        widget: "list"
        hint: "Type a category and press enter. Reuse existing ones (Strategy, AI, Engagement, Teams, Leadership, Economic, Coaching, Culture) where they fit, or add new ones. Keep this to 2-3 per article for the strongest SEO signal."
      - label: "Tags (optional, additional keywords)"
        name: "tags"
        widget: "list"
        required: false
        hint: "Optional extra keywords for on-site search. Can be as many as you like."
      - { label: "Excerpt (short summary shown on the articles list)", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Sources"
        name: "sources"
        widget: "list"
        required: false
        field: { label: "Source (name and/or link)", name: "source", widget: "string" }
